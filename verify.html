<!doctype html>
<html lang="es-PE">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-title-es="Verificar certificado · Rainey Laguna Studios" data-title-en="Verify certificate · Rainey Laguna Studios">Verificar certificado · Rainey Laguna Studios</title>
<meta name="description" content="Verificación pública de un certificado de fabricación firmado por Rainey Laguna Studios." data-desc-es="Verificación pública de un certificado de fabricación firmado por Rainey Laguna Studios." data-desc-en="Public verification of a fabrication certificate signed by Rainey Laguna Studios.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://raineylagunastudios.com/verify.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200..900;1,9..144,200..900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --iron: #0E0D0B;
  --iron-raised: #161411;
  --bone: #F6F2E8;
  --bone-80: rgba(246, 242, 232, 0.80);
  --bone-60: rgba(246, 242, 232, 0.60);
  --bone-45: rgba(246, 242, 232, 0.45);
  --bone-25: rgba(246, 242, 232, 0.25);
  --bone-12: rgba(246, 242, 232, 0.12);
  --vermilion: #E83C1E;
  --copper: #8AA9A0;
  --verdigris: #6FB58F;
  --rule: rgba(246, 242, 232, 0.10);
  --rule-heavy: rgba(246, 242, 232, 0.30);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--iron);
  color: var(--bone);
  font-family: 'Fraunces', serif;
  font-variation-settings: 'wght' 380, 'opsz' 18;
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.mono { font-family: 'JetBrains Mono', monospace; font-variation-settings: normal; }

/* Header ---------------------------------------------------- */
.v-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px clamp(24px, 4vw, 56px);
  border-bottom: 0.5px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
}
.v-nav a { color: var(--bone); text-decoration: none; }
.v-nav a:hover { color: var(--vermilion); }
.v-brand { color: var(--bone); }
.v-brand b { font-family: 'Fraunces', serif; font-style: italic; font-variation-settings: 'wght' 420, 'opsz' 14; letter-spacing: 0; text-transform: none; }
.v-lang button {
  background: transparent; border: 0.5px solid var(--rule-heavy);
  color: var(--bone-60); font: inherit; text-transform: uppercase;
  padding: 6px 10px; margin-left: 6px; cursor: pointer; letter-spacing: 2px;
}
.v-lang button[aria-pressed="true"] { color: var(--bone); border-color: var(--bone); }

/* Layout ---------------------------------------------------- */
main {
  max-width: 1040px;
  margin: 0 auto;
  padding: clamp(40px, 6vw, 80px) clamp(24px, 4vw, 56px) 120px;
}

/* Verify hero badge ---------------------------------------- */
.verify-hero { margin-bottom: 48px; }
.verify-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 16px; border: 1px solid var(--verdigris);
  color: var(--verdigris);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  border-radius: 2px;
  margin-bottom: 24px;
}
.verify-badge-fail { border-color: var(--vermilion); color: var(--vermilion); }
.verify-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 12px currentColor;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.verify-intro {
  font-size: 20px; line-height: 1.55;
  font-variation-settings: 'wght' 340, 'opsz' 22;
  max-width: 56ch;
}
.verify-intro strong { font-variation-settings: 'wght' 520, 'opsz' 22; }

/* Certificate --------------------------------------------- */
.verify-cert {
  background: var(--bone);
  color: var(--iron);
  padding: clamp(28px, 4vw, 48px);
  margin: 48px 0;
  border: 1px solid var(--iron);
  position: relative;
}
.verify-cert::before {
  content: '';
  position: absolute; inset: 6px;
  border: 0.5px solid rgba(14, 13, 11, 0.15);
  pointer-events: none;
}
.verify-cert-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px; flex-wrap: wrap;
  padding-bottom: 20px;
  border-bottom: 0.5px solid rgba(14, 13, 11, 0.2);
}
.verify-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
}
.verify-mark-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; color: rgba(14, 13, 11, 0.55);
  margin-top: 6px;
}
.verify-serial-box { text-align: right; }
.verify-serial-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; color: rgba(14, 13, 11, 0.55);
  text-transform: uppercase;
}
.verify-serial {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; letter-spacing: 1px;
  margin-top: 4px;
}
.verify-edition {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(14, 13, 11, 0.55); margin-top: 4px;
}

.verify-body {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 40px;
  padding: 32px 0;
}
@media (max-width: 720px) {
  .verify-body { grid-template-columns: 1fr; }
  .verify-body-aside { order: -1; text-align: center; }
}

.verify-name {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'wght' 320, 'opsz' 96;
  font-size: clamp(32px, 5vw, 48px);
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.verify-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.6);
  margin-bottom: 28px;
}
.verify-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.55);
  margin: 28px 0 10px;
}
.verify-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 14px 24px;
}
.verify-field dt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.55);
}
.verify-field dd {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'wght' 380, 'opsz' 18;
  font-size: 15px;
  margin-top: 2px;
}
.verify-climate {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'wght' 350, 'opsz' 20;
  font-size: 15px;
}
.verify-climate small {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-variation-settings: normal;
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.5);
  margin-top: 4px;
}

.verify-qr {
  width: 180px; height: 180px;
  display: block;
  image-rendering: pixelated;
}
.verify-qr-caption {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.55);
  margin-top: 8px;
  text-align: center;
  max-width: 180px;
}

.verify-crypto {
  border-top: 0.5px solid rgba(14, 13, 11, 0.2);
  padding-top: 20px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
.verify-crypto-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  align-items: baseline;
  padding: 4px 0;
  border-bottom: 0.25px dashed rgba(14, 13, 11, 0.12);
}
.verify-crypto-row dt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(14, 13, 11, 0.55);
}
.verify-crypto-row dd {
  font-size: 11px;
  word-break: break-all;
}
.verify-crypto-row dd.mono { font-family: 'JetBrains Mono', monospace; }
.verify-pubkey, .verify-sig { letter-spacing: 0; }
@media (max-width: 600px) {
  .verify-crypto-row { grid-template-columns: 1fr; gap: 2px; }
}

/* Meaning ------------------------------------------------- */
.verify-meaning {
  margin-top: 64px;
  max-width: 62ch;
}
.verify-meaning h2 {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'wght' 340, 'opsz' 48;
  font-size: clamp(24px, 3vw, 32px);
  line-height: 1.2;
  margin-bottom: 16px;
}
.verify-meaning p {
  font-variation-settings: 'wght' 360, 'opsz' 20;
  font-size: 17px;
  margin-bottom: 14px;
  color: var(--bone-80);
}

footer.v-foot {
  border-top: 0.5px solid var(--rule);
  padding: 24px clamp(24px, 4vw, 56px);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--bone-45);
}
footer.v-foot a { color: var(--bone-60); text-decoration: none; }
footer.v-foot a:hover { color: var(--vermilion); }
</style>
</head>
<body>

<nav class="v-nav">
  <a href="index.html" class="v-brand">Rainey <b>Laguna</b> Studios</a>
  <div class="v-lang">
    <button id="langEs" aria-pressed="true">ES</button>
    <button id="langEn" aria-pressed="false">EN</button>
  </div>
</nav>

<main id="verify-root" aria-live="polite">
  <!-- Rendered by scripts/proof-of-fabrication.js -->
  <p class="mono" style="color:var(--bone-45);font-size:11px">Cargando…</p>
</main>

<footer class="v-foot">
  <span>Rainey Laguna Studios · Lima</span>
  <span><a href="index.html">← raineylagunastudios.com</a></span>
</footer>

<script>
// Lightweight i18n for verify.html — mirrors index.html behaviour.
let LANG = (function() {
  try {
    const qs = new URLSearchParams(location.search).get('lang');
    if (qs === 'en' || qs === 'es') return qs;
    const saved = localStorage.getItem('rls-lang');
    if (saved === 'en' || saved === 'es') return saved;
  } catch(e){}
  return (navigator.language || 'es').toLowerCase().startsWith('es') ? 'es' : 'en';
})();

function applyI18n() {
  document.documentElement.lang = LANG === 'es' ? 'es-PE' : 'en-US';
  const t = document.querySelector('title');
  if (t) t.textContent = LANG === 'es' ? t.getAttribute('data-title-es') : t.getAttribute('data-title-en');
  const d = document.querySelector('meta[name="description"]');
  if (d) d.setAttribute('content', LANG === 'es' ? d.getAttribute('data-desc-es') : d.getAttribute('data-desc-en'));
  document.getElementById('langEs').setAttribute('aria-pressed', LANG === 'es');
  document.getElementById('langEn').setAttribute('aria-pressed', LANG === 'en');
}

function setLang(l) {
  if (l === LANG) return;
  LANG = l;
  try { localStorage.setItem('rls-lang', l); } catch(e){}
  applyI18n();
}
document.getElementById('langEs').addEventListener('click', () => setLang('es'));
document.getElementById('langEn').addEventListener('click', () => setLang('en'));
applyI18n();
</script>
<script type="module" src="scripts/proof-of-fabrication.js"></script>
</body>
</html>
