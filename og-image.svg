<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: iron -->
  <rect width="1200" height="630" fill="#0E0D0B"/>

  <!-- Faint blueprint grid, masked to soften at edges -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F6F2E8" stroke-width="1" opacity="0.06"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0E0D0B" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Registration mark · upper right -->
  <g transform="translate(990 130)" stroke="#F6F2E8" fill="none" stroke-width="2">
    <circle cx="60" cy="60" r="54"/>
    <line x1="60" y1="6"  x2="60" y2="114"/>
    <line x1="6"  y1="60" x2="114" y2="60"/>
    <circle cx="60" cy="60" r="6" fill="#E83C1E" stroke="none"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" fill="#F6F2E8" opacity="0.55"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="16" letter-spacing="4" text-anchor="start">
    RAINEY LAGUNA STUDIOS · LIMA · EST. 2026
  </text>

  <!-- Headline -->
  <text x="80" y="320" fill="#F6F2E8"
        font-family="'Fraunces', Georgia, serif"
        font-weight="320" font-size="120" letter-spacing="-3"
        text-anchor="start">
    Cosas que se miran,
  </text>
  <text x="80" y="440" fill="#F6F2E8"
        font-family="'Fraunces', Georgia, serif"
        font-weight="320" font-size="120" letter-spacing="-3"
        text-anchor="start">
    que se tocan,
  </text>
  <text x="80" y="560" fill="#E83C1E"
        font-family="'Fraunces', Georgia, serif"
        font-weight="320" font-style="italic" font-size="120" letter-spacing="-3"
        text-anchor="start">
    que duran.
  </text>

  <!-- URL -->
  <text x="1120" y="590" fill="#F6F2E8" opacity="0.75"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="16" letter-spacing="4" text-anchor="end">
    RAINEYLAGUNASTUDIOS.COM
  </text>

  <!-- Bottom vermilion rule -->
  <rect x="0" y="626" width="1200" height="4" fill="#E83C1E"/>
</svg>
